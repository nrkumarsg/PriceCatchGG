services:
  # Backend Node.js Service
  - type: web
    name: price-catch-backend
    env: docker
    plan: free
    region: singapore
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: PORT
        value: 3000
      - key: REDIS_URL
        fromService:
          type: redis
          name: price-catch-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_VISION_API_KEY
        sync: false

  # Redis Instance
  - type: redis
    name: price-catch-redis
    plan: free
    region: singapore
    ipAllowList: []

  # Frontend Flutter Web Service
  - type: static_site
    name: price-catch-frontend
    buildCommand: "cd frontend && flutter build web --release"
    publishPath: frontend/build/web
