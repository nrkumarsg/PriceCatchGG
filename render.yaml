services:
  # Backend Node.js Service
  - type: web
    name: price-catch-backend
    env: docker
    repo: https://github.com/YOUR_USERNAME/PriceCatchGG # Replace with your repo URL
    plan: free # Can be upgraded for more RAM
    region: singapore # Choose closest to you
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: PORT
        value: 3000
      - key: REDIS_URL
        fromService:
          type: redis
          name: price-catch-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false # Set this in Render Dashboard
      - key: GOOGLE_VISION_API_KEY
        sync: false # Set this in Render Dashboard

  # Redis Instance
  - type: redis
    name: price-catch-redis
    plan: free
    region: singapore
    ipAllowList: [] # Only allow internal traffic

  # Frontend Flutter Web Service
  - type: web
    name: price-catch-frontend
    env: static
    repo: https://github.com/YOUR_USERNAME/PriceCatchGG # Replace with your repo URL
    buildCommand: "cd frontend && flutter build web --release"
    publishPath: frontend/build/web
